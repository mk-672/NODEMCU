<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>MK SMART HOME</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      background: linear-gradient(-45deg,#0f172a,#111827,#1e293b,#020617);
      background-size:400% 400%;
      animation:bgMove 15s ease infinite;
      color:white;
      overflow-x:hidden;
      padding:20px;
    }

    @keyframes bgMove{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    .blur-circle{
      position:fixed;
      width:300px;
      height:300px;
      border-radius:50%;
      filter:blur(100px);
      z-index:-1;
      opacity:0.5;
    }

    .circle1{
      background:#00d4ff;
      top:-100px;
      left:-100px;
    }

    .circle2{
      background:#7c3aed;
      bottom:-100px;
      right:-100px;
    }

    h1{
      text-align:center;
      font-size:2.5rem;
      font-weight:700;
      margin-top:20px;
      margin-bottom:10px;
      letter-spacing:1px;
    }

    .subtitle{
      text-align:center;
      color:#cbd5e1;
      margin-bottom:35px;
      font-size:1rem;
    }

    /* LOGIN */

    #loginForm{
      width:100%;
      max-width:420px;
      margin:60px auto;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(18px);
      border-radius:28px;
      padding:35px 30px;
      box-shadow:0 8px 32px rgba(0,0,0,0.35);
    }

    .login-title{
      text-align:center;
      font-size:1.8rem;
      margin-bottom:25px;
      font-weight:600;
    }

    .input-group{
      margin-bottom:20px;
    }

    .input-group label{
      display:block;
      margin-bottom:8px;
      color:#cbd5e1;
      font-size:14px;
    }

    #loginForm input{
      width:100%;
      padding:14px 16px;
      border:none;
      border-radius:14px;
      background:rgba(255,255,255,0.1);
      color:white;
      outline:none;
      font-size:15px;
      transition:0.3s;
      border:1px solid transparent;
    }

    #loginForm input:focus{
      border-color:#38bdf8;
      box-shadow:0 0 15px rgba(56,189,248,0.4);
    }

    #loginForm input::placeholder{
      color:#94a3b8;
    }

    #loginBtn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      background:linear-gradient(135deg,#0ea5e9,#2563eb);
      color:white;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
      margin-top:10px;
    }

    #loginBtn:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 20px rgba(37,99,235,0.35);
    }

    /* DASHBOARD */

    #dashboard{
      display:none;
    }

    .topbar{
      max-width:1200px;
      margin:auto;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:15px;
      margin-bottom:30px;
    }

    .welcome-box{
      background:rgba(255,255,255,0.08);
      padding:16px 22px;
      border-radius:18px;
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.08);
    }

    .relay-container{
      max-width:1200px;
      margin:auto;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:25px;
    }

    .relay-card{
      position:relative;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:28px;
      padding:30px 20px;
      text-align:center;
      backdrop-filter:blur(18px);
      overflow:hidden;
      transition:0.35s;
      box-shadow:0 10px 25px rgba(0,0,0,0.25);
    }

    .relay-card:hover{
      transform:translateY(-8px);
      box-shadow:0 20px 40px rgba(0,0,0,0.4);
    }

    .relay-icon{
      width:80px;
      height:80px;
      margin:auto;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,0.08);
      font-size:35px;
      margin-bottom:20px;
      border:1px solid rgba(255,255,255,0.1);
    }

    .relay-card h2{
      font-size:1.5rem;
      margin-bottom:15px;
      font-weight:600;
    }

    .status-box{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      margin-bottom:22px;
      font-size:1rem;
      color:#e2e8f0;
    }

    .status-dot{
      width:12px;
      height:12px;
      border-radius:50%;
      background:red;
      box-shadow:0 0 12px red;
      animation:pulse 1.2s infinite;
    }

    @keyframes pulse{
      0%{transform:scale(1);opacity:1;}
      50%{transform:scale(1.4);opacity:0.6;}
      100%{transform:scale(1);opacity:1;}
    }

    .relay-btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:16px;
      font-size:15px;
      font-weight:600;
      cursor:pointer;
      color:white;
      background:linear-gradient(135deg,#2563eb,#1d4ed8);
      transition:0.3s;
    }

    .relay-btn:hover{
      transform:scale(1.03);
    }

    .action-buttons{
      max-width:1200px;
      margin:35px auto 10px;
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
    }

    .action-buttons button{
      padding:14px 28px;
      border:none;
      border-radius:16px;
      cursor:pointer;
      font-size:15px;
      font-weight:600;
      color:white;
      transition:0.3s;
    }

    #allOffBtn{
      background:linear-gradient(135deg,#ef4444,#dc2626);
    }

    #logoutBtn{
      background:linear-gradient(135deg,#475569,#334155);
    }

    .action-buttons button:hover{
      transform:translateY(-3px);
    }

    footer{
      margin-top:50px;
      text-align:center;
      color:#94a3b8;
      font-size:14px;
      padding-bottom:20px;
    }

    @media(max-width:768px){

      h1{
        font-size:2rem;
      }

      .topbar{
        justify-content:center;
        text-align:center;
      }

      .relay-card{
        padding:25px 18px;
      }

    }

  </style>
</head>
<body>

<div class="blur-circle circle1"></div>
<div class="blur-circle circle2"></div>

<h1>🏠 MK SMART HOME</h1>
<p class="subtitle">Next Generation IoT Automation Dashboard</p>

<!-- LOGIN -->
<div id="loginForm">

  <div class="login-title">🔐 Secure Login</div>

  <div class="input-group">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="Enter Email">
  </div>

  <div class="input-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter Password">
  </div>

  <button id="loginBtn">Login Dashboard</button>

</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="topbar">

    <div class="welcome-box">
      <h3>⚡ Smart Control Center</h3>
      <p style="color:#cbd5e1;font-size:14px; margin-top:4px;">
        Control your devices in real-time
      </p>
    </div>

  </div>

  <div class="relay-container">

    <div class="relay-card">
      <div class="relay-icon">💡</div>
      <h2>Relay 1</h2>

      <div class="status-box">
        <div class="status-dot" id="dot1"></div>
        <span id="status1">Loading...</span>
      </div>

      <button class="relay-btn" id="btn1">Toggle Device</button>
    </div>


    <div class="relay-card">
      <div class="relay-icon">🌀</div>
      <h2>Relay 2</h2>

      <div class="status-box">
        <div class="status-dot" id="dot2"></div>
        <span id="status2">Loading...</span>
      </div>

      <button class="relay-btn" id="btn2">Toggle Device</button>
    </div>

  </div>


  <div class="action-buttons">
    <button id="allOffBtn">⚠ Turn OFF All</button>
    <button id="logoutBtn">🚪 Logout</button>
  </div>

</div>

<footer>
  Designed & Developed by PN TECH SUPPORT 🚀
</footer>


<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCODACv3hkVd78cr37rzi_py6sYb6ay7g8",
  authDomain: "nodemcu-relay-01-a1dab.firebaseapp.com",
  databaseURL: "https://nodemcu-relay-01-a1dab-default-rtdb.firebaseio.com",
  projectId: "nodemcu-relay-01-a1dab",
  storageBucket: "nodemcu-relay-01-a1dab.firebasestorage.app",
  messagingSenderId: "1041965645126",
  appId: "1:1041965645126:web:f7971de6bdae3acc4db947"
};

firebase.initializeApp(firebaseConfig);

const loginForm = document.getElementById("loginForm");
const dashboard = document.getElementById("dashboard");
const loginBtn = document.getElementById("loginBtn");

loginBtn.addEventListener("click", () => {

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Please enter email and password");
    return;
  }

  loginBtn.innerHTML = "Connecting...";

  firebase.auth().signInWithEmailAndPassword(email, password)
  .then((userCredential) => {

    loginForm.style.display = "none";
    dashboard.style.display = "block";

    startRelayControl();

  })
  .catch((error) => {
    alert("Login Failed : " + error.message);
    loginBtn.innerHTML = "Login Dashboard";
  });

});


function startRelayControl(){

  const db = firebase.database();

  const relays = [
    {id:1,path:"relay1"},
    {id:2,path:"relay2"},
  ];

  relays.forEach(relay => {

    const statusText = document.getElementById(`status${relay.id}`);
    const toggleButton = document.getElementById(`btn${relay.id}`);
    const dot = document.getElementById(`dot${relay.id}`);

    const relayRef = db.ref("/" + relay.path);

    relayRef.on("value", (snapshot) => {

      const state = snapshot.val();

      statusText.innerText = state ? "ONLINE / ON" : "OFFLINE / OFF";

      if(state){

        toggleButton.style.background = "linear-gradient(135deg,#10b981,#059669)";
        dot.style.background = "#22c55e";
        dot.style.boxShadow = "0 0 15px #22c55e";

      }
      else{

        toggleButton.style.background = "linear-gradient(135deg,#2563eb,#1d4ed8)";
        dot.style.background = "#ef4444";
        dot.style.boxShadow = "0 0 15px #ef4444";

      }

    });


    toggleButton.onclick = () => {

      relayRef.get().then(snap => {
        relayRef.set(!snap.val());
      });

    };

  });


  document.getElementById("allOffBtn").onclick = () => {

    relays.forEach(relay => {
      db.ref("/" + relay.path).set(false);
    });

  };

}


// LOGOUT

document.getElementById("logoutBtn").onclick = () => {

  firebase.auth().signOut()
  .then(() => {

    dashboard.style.display = "none";
    loginForm.style.display = "block";

    document.getElementById("email").value = "";
    document.getElementById("password").value = "";

    loginBtn.innerHTML = "Login Dashboard";

  })
  .catch((error) => {
    alert("Logout Failed : " + error.message);
  });

};

</script>

</body>
</html>
